<div class="form-container">
  <div class="card form-card">

    <h2 class="form-title">
      {{ isEditMode ? 'Modifier l\'annonce' : 'Nouvelle annonce' }}
    </h2>

    <!-- Chargement -->
    <div *ngIf="isLoading && isEditMode" class="loading">Chargement...</div>

    <!-- Erreur -->
    <div *ngIf="error" class="error error-message">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" *ngIf="!isLoading || !isEditMode">

      <div class="form-group">
        <label>Titre *</label>
        <input
          type="text"
          name="title"
          [(ngModel)]="title"
          placeholder="Ex: iPhone 13 Pro"
          required
        />
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea
          name="description"
          [(ngModel)]="description"
          placeholder="Décrivez votre article..."
          rows="4"
          required
        ></textarea>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Prix ($) *</label>
          <input
            type="number"
            name="price"
            [(ngModel)]="price"
            placeholder="0"
            min="0"
            required
          />
        </div>

        <div class="form-group">
          <label>Catégorie *</label>
          <select name="category" [(ngModel)]="category" required>
            <option value="">Choisir...</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

      </div>

      <div class="form-group">
        <label>Images (URLs séparées par des virgules)</label>
        <input
          type="text"
          name="imagesInput"
          [(ngModel)]="imagesInput"
          placeholder="https://image1.jpg, https://image2.jpg"
        />
        <span class="field-hint">Optionnel — laissez vide si aucune image</span>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancel()"
        >
          Annuler
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Enregistrement...' : isEditMode ? 'Mettre à jour' : 'Publier' }}
        </button>
      </div>

    </form>

  </div>
</div>
